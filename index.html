<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Network Attack Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <h1>🛡️ Network Attack Dashboard</h1>
                <div class="header-info">
                    <span class="time" id="current-time"></span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- SOL PANEL: NETWORK VISUALIZATION -->
            <section class="network-panel">
                <h2>🌐 Network Activity</h2>
                <div class="network-grid" id="network-grid">
                    <!-- Dinamik olarak doldurulacak -->
                </div>
            </section>

            <!-- SAĞ PANEL: LOG & STATS -->
            <aside class="log-panel">
                <div class="log-header">
                    <h2>📋 Activity Log</h2>
                    <div style="display:flex;gap:8px;align-items:center">
                        <input id="log-filter" placeholder="Filter by username" style="padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit" />
                        <button class="btn-small" id="clear-logs">Clear</button>
                    </div>
                </div>
                <div class="log-content" id="log-content">
                    <!-- Dinamik olarak doldurulacak -->
                </div>
            </aside>
        </main>

        <!-- ALT PANEL: STATISTICS & CHART -->
        <footer class="stats-panel">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>🟢 Normal Users</h3>
                    <p class="stat-value" id="stat-normal">0</p>
                </div>
                <div class="stat-card">
                    <h3>🟡 Suspicious</h3>
                    <p class="stat-value" id="stat-suspicious">0</p>
                </div>
                <div class="stat-card">
                    <h3>🔴 Blocked</h3>
                    <p class="stat-value" id="stat-blocked">0</p>
                </div>
                <div class="stat-card">
                    <h3>⚔️ Total Attacks</h3>
                    <p class="stat-value" id="stat-attacks">0</p>
                </div>
                <div class="stat-card">
                    <h3>⚡ DDoS Attempts</h3>
                    <p class="stat-value" id="stat-ddos">0</p>
                </div>
                <div class="stat-card">
                    <h3>🔨 SQL Injections</h3>
                    <p class="stat-value" id="stat-sql">0</p>
                </div>
            </div>
            <div class="chart-container">
                <h3>📊 Attack Timeline</h3>
                <canvas id="attack-chart"></canvas>
            </div>
        </footer>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <h3>⚙️ Simulation Control</h3>
            <div class="controls">
                <button class="btn" id="btn-start-sim">Start Simulation</button>
                <button class="btn btn-danger" id="btn-stop-sim" disabled>Stop</button>
                <button class="btn btn-secondary" id="btn-add-user">Add Normal User</button>
            </div>
            <div class="controls" style="margin-top:8px;">
                <div style="display:flex;align-items:center;gap:8px">
                    <span>Selected:</span>
                    <strong id="selected-user-name">None</strong>
                </div>
            </div>
            <div class="controls" style="margin-top:8px;gap:8px">
                <button class="btn" id="btn-impersonate-selected">Impersonate Selected</button>
                <button class="btn btn-warning" id="btn-act-as-selected">Act as Attacker (Selected)</button>
                <button class="btn btn-danger" id="btn-target-attack-selected">Target Attack (Selected)</button>
                <button class="btn btn-secondary" id="btn-reset-network">Reset Network</button>
            </div>
            <div class="controls" style="margin-top: 12px; border-top: 1px solid rgba(6, 182, 212, 0.1); padding-top: 12px;">
                <button class="btn btn-warning" id="btn-trigger-brute-force">🔓 Brute Force</button>
                <button class="btn btn-danger" id="btn-trigger-bot-attack">🤖 Bot Attack</button>
                <button class="btn btn-danger" id="btn-trigger-ddos" style="background: linear-gradient(135deg, #d946ef 0%, #bb1fd9 100%);">⚡ DDoS Attack</button>
                <button class="btn btn-danger" id="btn-trigger-sql" style="background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);">🔨 SQL Injection</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/logger.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
